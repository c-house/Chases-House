<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chase's House</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    html { scroll-behavior: smooth; }

    /* Body becomes the forest stage */
    body.home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Forest backdrop */
    .forest-bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: url("/assets/forest-house-landscape.png");
      background-size: cover;
      background-position: center 60%;
      background-repeat: no-repeat;
      animation: forestFadeIn 1400ms ease-out backwards;
    }

    /* Portrait crop on tall/narrow viewports */
    @media (max-aspect-ratio: 1/1) {
      .forest-bg {
        background-image: url("/assets/forest-house-portrait.png");
        background-position: center center;
      }
    }

    /* Vignette + warm darken so the type holds */
    .forest-vignette {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(to top right,
          rgba(8,12,10,0.85) 0%,
          rgba(8,12,10,0.45) 30%,
          rgba(8,12,10,0.05) 55%,
          rgba(8,12,10,0.4) 100%),
        radial-gradient(ellipse 110% 90% at 50% 50%, transparent 45%, rgba(8,12,10,0.6) 100%);
    }

    /* Override the body::before / ::after ambient layers from styles.css —
       the forest carries the page now. */
    body.home::before,
    body.home::after { display: none; }

    /* ── Home page animation timing ── */
    .site-header {
      animation-duration: 600ms;
      animation-delay: 600ms;
    }

    .nav-link {
      animation-duration: 600ms;
      animation-delay: calc(700ms + var(--i, 0) * 80ms);
    }

    .site-footer {
      animation-duration: 600ms;
      animation-delay: 1300ms;
    }

    /* ── Hero ─────────────────────────────────────────── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 0 clamp(1.5rem, 5vw, 4.5rem) clamp(2rem, 5vh, 3rem);
      max-width: 52rem;
    }

    .site-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 96, 'WONK' 1, 'SOFT' 50;
      font-size: clamp(2.6rem, 6.5vw + 0.4rem, 5.4rem);
      font-weight: 350;
      color: var(--text-heading);
      line-height: 1.05;
      letter-spacing: -0.015em;
      white-space: nowrap;
      text-shadow:
        0 2px 24px rgba(0,0,0,0.7),
        0 1px 2px rgba(0,0,0,0.6);
      animation: fadeSlideUp 900ms ease-out backwards;
      animation-delay: 150ms;
    }

    .site-title .accent {
      /* Toned gold so it complements (not competes with) the cabin's lit window */
      color: #d9a458;
      text-shadow:
        0 2px 24px rgba(0,0,0,0.7),
        0 1px 4px rgba(0,0,0,0.55);
      animation: warmGlow 6s ease-in-out infinite;
      animation-delay: 1600ms;
      display: inline-block;
    }

    .site-tagline {
      font-family: var(--font-body);
      font-size: clamp(1rem, 1.5vw + 0.25rem, 1.2rem);
      font-weight: 350;
      color: rgba(245,238,224,0.92);
      margin-top: clamp(0.9rem, 2vw, 1.4rem);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 14px rgba(0,0,0,0.75);
      animation: fadeSlideUp 750ms ease-out backwards;
      animation-delay: 450ms;
    }

    /* Footer sits above the forest as quiet metadata */
    .site-footer {
      color: rgba(240,230,211,0.5);
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    @keyframes warmGlow {
      0%, 100% { text-shadow: 0 2px 24px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.55); }
      50%      { text-shadow: 0 2px 24px rgba(0,0,0,0.7), 0 0 38px rgba(217,164,88,0.35), 0 1px 4px rgba(0,0,0,0.55); }
    }

    @keyframes forestFadeIn {
      from { opacity: 0; transform: scale(1.04); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Lift nav links above the forest */
    body.home .nav-link {
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .hero {
        align-items: flex-start;
        text-align: left;
      }
      .site-title { white-space: normal; }
    }

    @media (max-width: 480px) {
      .hero {
        padding-bottom: clamp(1.5rem, 4vh, 2.5rem);
      }
    }
  </style>
</head>
<body class="home">
  <!-- Forest backdrop layers (fixed, full-viewport) -->
  <div class="forest-bg" aria-hidden="true"></div>
  <div class="forest-vignette" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <span class="nav-link active" style="--i:0" aria-current="page">Home</span>
      <a class="nav-link" style="--i:1" href="/games/">Games</a>
      <a class="nav-link" style="--i:2" href="/cookbook/">Cookbook</a>
      <span id="music-nav" class="nav-link coming-soon" style="--i:3">Music<span class="coming-soon-tag">soon</span></span>
      <span id="lookout-nav" class="nav-link coming-soon" style="--i:4">Lookout<span class="coming-soon-tag">soon</span></span>
      <a class="nav-link" style="--i:5" href="/files/">Files</a>
    </nav>
  </header>

  <main class="hero">
    <h1 class="site-title">Chase's <span class="accent">House</span></h1>
    <p class="site-tagline">Welcome in. Make yourself at home.</p>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Chase's House</p>
  </footer>
<script src="/nav-health.js" defer></script>
</body>
</html>
