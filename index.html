<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chase's House</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    html { scroll-behavior: smooth; }

    /* ── Home page animation timing (longer stagger for hero sequence) ── */
    .site-header {
      animation-duration: 600ms;
      animation-delay: 600ms;
    }

    .nav-link {
      animation-duration: 600ms;
      animation-delay: calc(700ms + var(--i, 0) * 80ms);
    }

    .site-footer {
      animation-duration: 600ms;
      animation-delay: 1300ms;
    }

    /* ── Hero ─────────────────────────────────────────── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(4rem, 12vh, 10rem) clamp(1.5rem, 5vw, 4rem) clamp(2rem, 5vh, 4rem);
      max-width: 72rem;
    }

    .site-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 48, 'WONK' 1, 'SOFT' 50;
      font-size: clamp(2.8rem, 7vw + 0.5rem, 6rem);
      font-weight: 350;
      color: var(--text-heading);
      line-height: 1.05;
      letter-spacing: -0.01em;
      animation: fadeSlideUp 900ms ease-out backwards;
      animation-delay: 150ms;
    }

    .site-title .accent {
      color: var(--accent-gold);
      animation: warmGlow 5s ease-in-out infinite;
      animation-delay: 1200ms;
      display: inline-block;
    }

    .site-tagline {
      font-family: var(--font-body);
      font-size: clamp(1rem, 1.8vw + 0.3rem, 1.35rem);
      font-weight: 350;
      color: var(--text-muted);
      margin-top: clamp(0.8rem, 2vw, 1.5rem);
      letter-spacing: 0.02em;
      animation: fadeSlideUp 750ms ease-out backwards;
      animation-delay: 450ms;
    }

    /* ── Rooms Section ────────────────────────────────── */
    .rooms {
      padding: 0 clamp(1.5rem, 5vw, 4rem) clamp(3rem, 8vh, 6rem);
    }

    .room-card {
      display: block;
      max-width: 22rem;
      padding: clamp(1.5rem, 3vw, 2rem);
      background: var(--bg-surface);
      border: 1px solid var(--accent-ember);
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 1000ms;
    }

    .room-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-gold);
      box-shadow: 0 8px 32px rgba(200, 148, 62, 0.12), 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .room-icon {
      display: block;
      font-size: 1.8rem;
      margin-bottom: 0.6rem;
      opacity: 0.9;
    }

    .room-card h2 {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 28, 'WONK' 1, 'SOFT' 40;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--text-heading);
      margin-bottom: 0.3rem;
    }

    .room-card p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    @keyframes warmGlow {
      0%, 100% { text-shadow: 0 0 30px rgba(200, 148, 62, 0.25); }
      50%      { text-shadow: 0 0 50px rgba(200, 148, 62, 0.45), 0 0 90px rgba(200, 148, 62, 0.12); }
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .hero {
        align-items: center;
        text-align: center;
      }

      .rooms {
        display: flex;
        justify-content: center;
      }

      .room-card {
        max-width: 100%;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .hero {
        padding-top: clamp(3rem, 8vh, 5rem);
      }
    }
  </style>
</head>
<body>
  <!-- SVG noise filter (hidden) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </svg>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <span class="nav-link active" style="--i:0" aria-current="page">Home</span>
      <a class="nav-link" style="--i:1" href="/games/">Games</a>
      <span id="music-nav" class="nav-link coming-soon" style="--i:2">Music<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:3">Blog<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:4">Links<span class="coming-soon-tag">soon</span></span>
    </nav>
  </header>

  <main class="hero">
    <h1 class="site-title">Chase's <span class="accent">House</span></h1>
    <p class="site-tagline">Welcome in. Make yourself at home.</p>
  </main>

  <section class="rooms" aria-label="Explore">
    <a class="room-card" href="/games/">
      <span class="room-icon" aria-hidden="true">&#9823;</span>
      <h2>Games</h2>
      <p>Browser-based games to play with friends.</p>
    </a>
  </section>

  <footer class="site-footer">
    <p>&copy; 2026 Chase's House</p>
  </footer>
<script>
  (function () {
    var el = document.getElementById('music-nav');
    if (!el) return;
    var ctrl = new AbortController();
    setTimeout(function () { ctrl.abort(); }, 4000);
    fetch('https://dj.thewiseguy.ai/health', { mode: 'cors', signal: ctrl.signal })
      .then(function (r) {
        if (!r.ok) return;
        var link = document.createElement('a');
        link.href = 'https://dj.thewiseguy.ai';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.className = 'nav-link music-live';
        link.style.cssText = el.style.cssText;
        link.textContent = 'Music';
        el.replaceWith(link);
      })
      .catch(function () {});
  })();
</script>
</body>
</html>
