<!doctype html><html><head><meta charset="utf-8"><title>Shadows & Elevation — Forest</title>
<style>
  body { margin: 0; background: #0d1410; padding: 24px 28px; font-family: 'Bricolage Grotesque', sans-serif; color: #f0e6d3;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 40%, rgba(232,183,90,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 80% 70%, rgba(122,148,96,0.035) 0%, transparent 60%);
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .card { background: #1f3329; border: 1px solid #a06828; border-radius: 6px; padding: 18px 16px; }
  .card.rest { box-shadow: 0 12px 32px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.3); }
  .card.hover { border-color: #e8b75a; box-shadow: 0 8px 32px rgba(232,183,90,0.14), 0 2px 8px rgba(0,0,0,0.45); transform: translateY(-4px); }
  .card.glow { box-shadow: 0 0 0 4px rgba(232,183,90,0.10); border-color: #f4cc6e; }
  .label { font-size: 9px; color: #5a6a5e; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; }
  .title { font-family: 'Fraunces', serif; font-variation-settings: 'opsz' 28, 'WONK' 1, 'SOFT' 40; font-size: 14px; color: #faf3e6; }
  .meta { font-family: 'SFMono-Regular', monospace; font-size: 9px; color: #9aa89a; margin-top: 6px; }
</style></head>
<body>
  <div class="grid">
    <div class="card rest"><div class="label">rest on artwork</div><div class="title">Card</div><div class="meta">0 12 32 black/.45 + 0 2 6 black/.3</div></div>
    <div class="card hover"><div class="label">hover · window halo</div><div class="title">Card</div><div class="meta">0 8 32 gold/.14 + 0 2 8 black/.45</div></div>
    <div class="card glow"><div class="label">dragover · focus ring</div><div class="title">Card</div><div class="meta">0 0 0 4 gold/.10</div></div>
  </div>
</body></html>
