<!doctype html><html><head><meta charset="utf-8"><title>Type · Rustic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Lora:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #f3ead8; padding: 22px 28px; font-family: 'Lora', serif; color: #2b1e14;
    background-image:
      radial-gradient(at 12% 8%, rgba(184,80,42,0.05) 0, transparent 50%),
      radial-gradient(at 88% 92%, rgba(94,107,58,0.06) 0, transparent 50%);
  }
  .smallcaps { font-family: 'Cormorant Garamond', serif; text-transform: uppercase; letter-spacing: 0.24em; font-weight: 600; font-size: 11px; color: #8a7354; }
  .display { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 56px; letter-spacing: -0.01em; line-height: 0.95; color: #2b1e14; }
  .display.italic { font-style: italic; font-size: 32px; line-height: 1.1; margin-top: 6px; }
  .script { font-family: 'Caveat', cursive; font-size: 24px; color: #b8502a; }
  .body { font-size: 15px; color: #5a4630; max-width: 540px; line-height: 1.55; margin-top: 6px; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: #b8502a; }
  .row { margin-bottom: 6px; }
</style></head>
<body>
  <div class="row"><span class="smallcaps">Est. 2026 · Vol. I</span></div>
  <div class="display">The Family Cookbook</div>
  <div class="display italic">Mains</div>
  <div class="script">recipes worth keeping</div>
  <div class="body">Crispy skin, buttery herb rub, a whole lemon in the cavity. <span class="mono">3½ tbsp</span> butter, melted.</div>
</body></html>
