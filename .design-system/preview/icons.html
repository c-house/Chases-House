<!doctype html><html><head><meta charset="utf-8"><title>Iconography — Forest</title>
<style>
  body { margin: 0; background: #0d1410; padding: 22px 28px; font-family: 'Bricolage Grotesque', sans-serif; color: #f0e6d3; }
  .label { font-size: 9px; color: #5a6a5e; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-bottom: 18px; }
  .icon { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; background: #1f3329; border: 1px solid #a06828; border-radius: 6px; }
  .glyph { font-size: 22px; color: #e8b75a; opacity: 0.9; line-height: 1; }
  .name { font-size: 9px; color: #9aa89a; text-align: center; }
  .svg-row { display: flex; gap: 18px; align-items: center; }
  .svg-icon { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #e8b75a; }
</style></head>
<body>
  <div class="label">Unicode glyphs · sized 1.75–1.8rem · opacity 0.7–0.9</div>
  <div class="row">
    <div class="icon"><span class="glyph">&#9823;</span><span class="name">games</span></div>
    <div class="icon"><span class="glyph">&#127859;</span><span class="name">cookbook</span></div>
    <div class="icon"><span class="glyph">&#9818;</span><span class="name">chess</span></div>
    <div class="icon"><span class="glyph">&#128013;</span><span class="name">snake</span></div>
    <div class="icon"><span class="glyph">&#9638;</span><span class="name">sudoku</span></div>
    <div class="icon"><span class="glyph">&#9641;</span><span class="name">crossword</span></div>
    <div class="icon"><span class="glyph">&#10067;</span><span class="name">jeopardy</span></div>
    <div class="icon"><span class="glyph">&#9737;</span><span class="name">pacman</span></div>
  </div>
  <div class="label">Bespoke SVG (rustic) · 1.6 stroke, round caps</div>
  <div class="svg-row">
    <div class="svg-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><span class="name">search</span></div>
    <div class="svg-icon" style="color:#b05a3a"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.5-7 10-7 10Z"/></svg><span class="name">heart</span></div>
    <div class="svg-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span class="name">clock</span></div>
    <div class="svg-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3 2.8-5 6-5s6 2 6 5"/></svg><span class="name">users</span></div>
    <div class="svg-icon" style="color:#c08a2e"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3.5l2.7 5.5 6 .9-4.4 4.3 1 6.1L12 17.6 6.7 20.3l1-6.1L3.3 9.9l6-.9L12 3.5Z"/></svg><span class="name">star</span></div>
    <div class="svg-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 9V3h10v6"/><rect x="4" y="9" width="16" height="9" rx="1"/><path d="M7 15h10v5H7z"/></svg><span class="name">print</span></div>
  </div>
</body></html>
