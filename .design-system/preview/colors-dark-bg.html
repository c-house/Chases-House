<!doctype html><html><head><meta charset="utf-8"><title>Dark Backgrounds — Forest Ladder</title>
<style>
  body { margin: 0; background: #0d1410; padding: 0; font-family: 'Bricolage Grotesque', sans-serif; color: #f0e6d3; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); height: 220px; }
  .swatch { display: flex; flex-direction: column; justify-content: flex-end; padding: 14px 16px; gap: 4px; box-sizing: border-box; }
  .name { font-size: 11px; color: #faf3e6; font-weight: 500; }
  .hex { font-family: 'SFMono-Regular', monospace; font-size: 10px; color: #9aa89a; }
  .role { font-size: 9px; color: #5a6a5e; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
  .caption { padding: 14px 16px; font-size: 11px; color: #9aa89a; font-style: italic; border-top: 1px solid rgba(160,104,40,0.25); }
</style></head>
<body>
  <div class="grid">
    <div class="swatch" style="background:#0d1410"><div class="role">Canopy edge</div><div class="name">bg-deep</div><div class="hex">#0d1410</div></div>
    <div class="swatch" style="background:#152821"><div class="role">Pine shadow</div><div class="name">bg-main</div><div class="hex">#152821</div></div>
    <div class="swatch" style="background:#1f3329"><div class="role">Moss-stone · cards</div><div class="name">bg-surface</div><div class="hex">#1f3329</div></div>
    <div class="swatch" style="background:#2a4234"><div class="role">Fern · elevated</div><div class="name">bg-elevated</div><div class="hex">#2a4234</div></div>
  </div>
  <div class="caption">A four-step ladder, dim greens. Outermost matches the artwork's canopy edge — chrome blends into the painting.</div>
</body></html>
