<!doctype html><html><head><meta charset="utf-8"><title>Banners — Forest</title>
<style>
  body { margin: 0; background: #0d1410; padding: 22px 28px; font-family: 'Bricolage Grotesque', sans-serif; color: #f0e6d3; }
  .label { font-size: 9px; color: #5a6a5e; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 10px; }
  .banner { padding: 0.9rem 1.1rem; border-radius: 6px; font-size: 0.92rem; line-height: 1.5; border: 1px solid; margin-bottom: 10px; max-width: 520px; }
  .warn { background: rgba(176,90,58,0.10); border-color: #b05a3a; color: #f0e6d3; }
  .error { background: rgba(176,90,58,0.14); border-color: #b05a3a; color: #faf3e6; }
  .success { background: rgba(122,148,96,0.14); border-color: #7a9460; color: #faf3e6; }
  strong { color: #faf3e6; }
</style></head>
<body>
  <div class="label">Warn · terracotta (the chimney)</div>
  <div class="banner warn"><strong>Use Chrome, Edge, or Firefox 111+.</strong> This tool needs the File System Access API.</div>
  <div class="label">Error · terracotta, deeper bg</div>
  <div class="banner error"><strong>Wrong passphrase.</strong> Try again — or check the channel where it was sent.</div>
  <div class="label">Success · sage · forest growth</div>
  <div class="banner success"><strong>Decrypted.</strong> Your file is saved to <em>Downloads</em>.</div>
</body></html>
