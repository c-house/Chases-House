<!doctype html><html><head><meta charset="utf-8"><title>Buttons Rustic</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #f3ead8; padding: 22px 28px; font-family: 'Lora', serif; color: #2b1e14;
    background-image:
      radial-gradient(at 12% 8%, rgba(184,80,42,0.05) 0, transparent 50%),
      radial-gradient(at 88% 92%, rgba(94,107,58,0.06) 0, transparent 50%);
  }
  .label { font-family: 'Cormorant Garamond', serif; font-size: 10px; color: #8a7354; text-transform: uppercase; letter-spacing: 0.24em; font-weight: 600; margin-bottom: 10px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .btn { font-family: inherit; padding: 10px 18px; border-radius: 2px; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; cursor: pointer; border: none; }
  .btn.ink { background: #2b1e14; color: #f3ead8; }
  .btn.terra { background: #b8502a; color: #f3ead8; }
  .btn.terra-hover { background: #8c3a1e; color: #f3ead8; }
  .btn.ghost { background: transparent; color: #2b1e14; box-shadow: inset 0 0 0 1.5px #2b1e14; }
  .chip { font-family: inherit; font-size: 12px; padding: 6px 12px 7px; background: transparent; border: 1px solid #c9b48d; color: #5a4630; border-radius: 100px; cursor: pointer; letter-spacing: 0.04em; text-transform: lowercase; }
  .chip.active { background: #2b1e14; color: #f3ead8; border-color: #2b1e14; }
  .chip .count { margin-left: 6px; opacity: 0.55; font-size: 10px; }
</style></head>
<body>
  <div class="label">Buttons · 2px radius, letterpress</div>
  <div class="row">
    <button class="btn ink">Save</button>
    <button class="btn terra">Start cook mode →</button>
    <button class="btn terra-hover">Start cook mode →</button>
    <button class="btn ghost">back to book</button>
  </div>
  <div class="label">Chips · 100px pill, lowercase</div>
  <div class="row">
    <button class="chip">pork<span class="count">3</span></button>
    <button class="chip">lemon<span class="count">2</span></button>
    <button class="chip active">garlic<span class="count">5</span></button>
    <button class="chip">mushroom<span class="count">2</span></button>
  </div>
</body></html>
