<!doctype html><html><head><meta charset="utf-8"><title>Logo — Forest</title>
<style>
  body { margin: 0; background: #152821; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; justify-items: center; height: 220px; gap: 0; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 24px; height: 100%; box-sizing: border-box; justify-content: center; width: 100%; }
  .dark { background: #0d1410; }
  .paper { background: #f3ead8; }
  .label { font-family: 'Bricolage Grotesque', sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: #5a6a5e; }
  .paper .label { color: #8a7354; }
  .lockup { font-family: 'Fraunces', serif; font-variation-settings: 'opsz' 48, 'WONK' 1, 'SOFT' 50; font-weight: 350; font-size: 30px; color: #faf3e6; letter-spacing: -0.01em; }
  .lockup .accent { color: #e8b75a; text-shadow: 0 0 30px rgba(232,183,90,0.45); }
  .paper .lockup { font-family: 'Cormorant Garamond', serif; font-style: italic; color: #2b1e14; font-weight: 500; }
  .paper .lockup .accent { color: #b8502a; text-shadow: none; }
</style></head>
<body>
  <div class="cell dark"><img src="../assets/favicon.svg" width="64" height="64" alt=""><div class="label">Mark · cabin window</div></div>
  <div class="cell dark"><div class="lockup">Chase's <span class="accent">House</span></div><div class="label">Wordmark · forest</div></div>
  <div class="cell paper"><div class="lockup">Chase's <span class="accent">House</span></div><div class="label">Wordmark · paper</div></div>
</body></html>
