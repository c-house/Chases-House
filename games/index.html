<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games - Chase's House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0a0b;
      --bg-main: #141416;
      --bg-surface: #1e1e21;
      --bg-elevated: #28282c;

      --text-primary: #f0e6d3;
      --text-heading: #faf3e6;
      --text-muted: #9a8e7a;
      --text-faint: #5c5347;

      --accent-gold: #c8943e;
      --accent-glow: #e8b04a;
      --accent-ember: #a06828;
      --terracotta: #b05a3a;
      --sage: #6a7d5a;

      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Bricolage Grotesque', 'Trebuchet MS', sans-serif;
    }

    /* ── Base ──────────────────────────────────────────── */
    body {
      font-family: var(--font-body);
      font-weight: 400;
      color: var(--text-primary);
      background-color: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Ambient Background Layers ────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%,
          rgba(200, 148, 62, 0.035) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 70%,
          rgba(176, 90, 58, 0.025) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 0%,
          rgba(30, 30, 34, 0.7) 0%, transparent 50%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.035;
      filter: url(#grain);
      pointer-events: none;
    }

    /* ── Header ───────────────────────────────────────── */
    .site-header {
      position: relative;
      padding: clamp(1.2rem, 3vw, 2rem) clamp(1.5rem, 5vw, 4rem);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      animation: fadeIn 500ms ease-out backwards;
      animation-delay: 100ms;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: clamp(1.5rem, 5vw, 4rem);
      right: clamp(1.5rem, 5vw, 4rem);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-ember), transparent);
      opacity: 0.3;
    }

    /* ── Navigation ───────────────────────────────────── */
    .nav {
      display: flex;
      gap: clamp(1.2rem, 3vw, 2.5rem);
      list-style: none;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-link {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 24, 'WONK' 1, 'SOFT' 40;
      font-size: clamp(0.85rem, 1.2vw, 1.05rem);
      font-weight: 450;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.03em;
      position: relative;
      padding: 0.4rem 0;
      transition: color 0.3s ease;
      animation: fadeSlideUp 500ms ease-out backwards;
      animation-delay: calc(200ms + var(--i, 0) * 60ms);
    }

    .nav-link:hover { color: var(--accent-glow); }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: var(--accent-glow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .nav-link:hover::after { transform: scaleX(1); }

    .nav-link.active {
      color: var(--accent-gold);
      cursor: default;
    }

    .nav-link.active::before {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-gold);
    }

    .nav-link.active::after { display: none; }

    .nav-link.coming-soon {
      color: var(--text-muted);
      pointer-events: none;
      cursor: default;
    }

    .nav-link.coming-soon::after { display: none; }

    .coming-soon-tag {
      font-family: var(--font-body);
      font-size: 0.5em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-faint);
      vertical-align: super;
      margin-left: 0.3em;
    }

    /* ── Page Content ─────────────────────────────────── */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(4rem, 12vh, 10rem) clamp(1.5rem, 5vw, 4rem) clamp(2rem, 5vh, 4rem);
      max-width: 72rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 48, 'WONK' 1, 'SOFT' 50;
      font-size: clamp(2.4rem, 6vw + 0.5rem, 4.5rem);
      font-weight: 350;
      color: var(--text-heading);
      line-height: 1.1;
      letter-spacing: -0.01em;
      animation: fadeSlideUp 800ms ease-out backwards;
      animation-delay: 100ms;
    }

    .page-description {
      font-size: clamp(1rem, 1.6vw + 0.3rem, 1.25rem);
      font-weight: 350;
      color: var(--text-muted);
      margin-top: clamp(0.8rem, 2vw, 1.5rem);
      max-width: 36rem;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 300ms;
    }

    /* ── Footer ───────────────────────────────────────── */
    .site-footer {
      padding: clamp(1.5rem, 3vw, 2.5rem) clamp(1.5rem, 5vw, 4rem);
      font-size: 0.8rem;
      color: var(--text-faint);
      animation: fadeIn 500ms ease-out backwards;
      animation-delay: 600ms;
    }

    /* ── Keyframes ────────────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Reduced Motion ───────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .site-header { justify-content: center; }
      .page-content { align-items: center; text-align: center; }
    }

    @media (max-width: 480px) {
      .nav { gap: clamp(0.8rem, 4vw, 1.5rem); }
      .page-content { padding-top: clamp(3rem, 8vh, 5rem); }
    }
  </style>
</head>
<body>
  <!-- SVG noise filter (hidden) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </svg>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="nav-link" style="--i:0" href="/">Home</a>
      <span class="nav-link active" style="--i:1" aria-current="page">Games</span>
      <span class="nav-link coming-soon" style="--i:2">Music<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:3">Blog<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:4">Links<span class="coming-soon-tag">soon</span></span>
    </nav>
  </header>

  <main class="page-content">
    <h1 class="page-title">Games</h1>
    <p class="page-description">Games are on their way. Check back soon.</p>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Chase's House</p>
  </footer>
</body>
</html>
