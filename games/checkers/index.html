<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkers - Chase's House</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Page Content ─────────────────────────────────── */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(2rem, 6vh, 5rem) clamp(1.5rem, 5vw, 4rem) clamp(2rem, 5vh, 4rem);
    }

    .page-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 48, 'WONK' 1, 'SOFT' 50;
      font-size: clamp(2rem, 5vw + 0.5rem, 3.5rem);
      font-weight: 350;
      color: var(--text-heading);
      line-height: 1.1;
      letter-spacing: -0.01em;
      text-align: center;
      animation: fadeSlideUp 800ms ease-out backwards;
      animation-delay: 100ms;
    }

    /* ── Difficulty Selector ──────────────────────────── */
    .difficulty-selector {
      display: flex;
      gap: 0.5rem;
      margin-top: clamp(1rem, 2vw, 1.5rem);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 250ms;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 1rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--accent-ember);
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .difficulty-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent-gold);
    }

    .difficulty-btn.active {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(200, 148, 62, 0.08);
    }

    /* ── Game Board ───────────────────────────────────── */
    .board-container {
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 400ms;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: clamp(280px, 55vw, 480px);
      aspect-ratio: 1;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid var(--accent-ember);
    }

    .square {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      position: relative;
      cursor: default;
    }

    .square.light {
      background: var(--bg-elevated);
    }

    .square.dark {
      background: var(--bg-surface);
    }

    .square.valid-move {
      cursor: pointer;
    }

    .square.valid-move::after {
      content: '';
      position: absolute;
      width: 30%;
      height: 30%;
      border-radius: 50%;
      background: rgba(200, 148, 62, 0.35);
      pointer-events: none;
    }

    .square.valid-capture::after {
      width: 80%;
      height: 80%;
      background: transparent;
      border: 3px solid rgba(200, 148, 62, 0.5);
      border-radius: 50%;
    }

    .square.last-move {
      background: rgba(200, 148, 62, 0.08);
    }

    /* ── Pieces ───────────────────────────────────────── */
    .piece {
      width: 75%;
      height: 75%;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .piece.player {
      background: radial-gradient(circle at 35% 35%, var(--accent-glow), var(--accent-gold));
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
    }

    .piece.ai {
      background: radial-gradient(circle at 35% 35%, #d47050, var(--terracotta));
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
    }

    .piece.selected {
      transform: scale(1.1);
      box-shadow: 0 0 16px rgba(200, 148, 62, 0.5), 0 4px 12px rgba(0, 0, 0, 0.4);
    }

    .piece.king::after {
      content: '\u265A';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(0.7rem, 2vw, 1.1rem);
      color: rgba(0, 0, 0, 0.6);
      line-height: 1;
    }

    .piece.player.king::after {
      color: rgba(60, 30, 0, 0.5);
    }

    .piece.ai.king::after {
      color: rgba(40, 10, 0, 0.5);
    }

    /* ── Status Bar ───────────────────────────────────── */
    .status-bar {
      margin-top: clamp(1rem, 2vw, 1.5rem);
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 550ms;
      flex-wrap: wrap;
      justify-content: center;
    }

    .status-text {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 24, 'WONK' 1, 'SOFT' 40;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      color: var(--text-muted);
      min-height: 1.5em;
    }

    .status-text .highlight {
      color: var(--accent-gold);
    }

    .new-game-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.45rem 1.2rem;
      background: transparent;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .new-game-btn:hover {
      background: rgba(200, 148, 62, 0.12);
      color: var(--accent-glow);
    }

    /* ── Score Display ────────────────────────────────── */
    .score-display {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 500ms;
    }

    .score-display .player-score { color: var(--accent-gold); }
    .score-display .ai-score { color: var(--terracotta); }

    /* ── Back Link ────────────────────────────────────── */
    .back-link {
      display: inline-block;
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      font-size: 0.88rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.25s ease;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 650ms;
    }

    .back-link:hover {
      color: var(--accent-gold);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 480px) {
      .page-content {
        padding-top: clamp(1.5rem, 4vh, 3rem);
      }
    }
  </style>
</head>
<body>
  <!-- SVG noise filter (hidden) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </svg>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="nav-link" style="--i:0" href="/">Home</a>
      <a class="nav-link active" style="--i:1" href="/games/">Games</a>
      <span class="nav-link coming-soon" style="--i:2">Music<span class="coming-soon-tag">soon</span></span>
    </nav>
  </header>

  <main class="page-content">
    <h1 class="page-title">Checkers</h1>

    <div class="difficulty-selector" role="group" aria-label="Difficulty">
      <button class="difficulty-btn" data-difficulty="easy">Easy</button>
      <button class="difficulty-btn active" data-difficulty="medium">Medium</button>
      <button class="difficulty-btn" data-difficulty="hard">Hard</button>
      <button class="difficulty-btn" data-difficulty="extreme">Extreme</button>
    </div>

    <div class="board-container">
      <div class="board" role="grid" aria-label="Checkers board" id="board"></div>
    </div>

    <div class="status-bar">
      <span class="status-text">Your turn — <span class="highlight">select a piece</span></span>
      <button class="new-game-btn">New Game</button>
    </div>

    <div class="score-display">
      <span class="player-score">You: 12</span>
      <span class="ai-score">AI: 12</span>
    </div>

    <a class="back-link" href="/games/">&larr; Back to Games</a>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Chase's House</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
