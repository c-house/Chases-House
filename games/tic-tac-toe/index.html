<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Chase's House</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Page Content ─────────────────────────────────── */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(2rem, 6vh, 5rem) clamp(1.5rem, 5vw, 4rem) clamp(2rem, 5vh, 4rem);
    }

    .page-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 48, 'WONK' 1, 'SOFT' 50;
      font-size: clamp(2rem, 5vw + 0.5rem, 3.5rem);
      font-weight: 350;
      color: var(--text-heading);
      line-height: 1.1;
      letter-spacing: -0.01em;
      text-align: center;
      animation: fadeSlideUp 800ms ease-out backwards;
      animation-delay: 100ms;
    }

    /* ── Difficulty Selector ──────────────────────────── */
    .difficulty-selector {
      display: flex;
      gap: 0.5rem;
      margin-top: clamp(1rem, 2vw, 1.5rem);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 250ms;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 1rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--accent-ember);
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .difficulty-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent-gold);
    }

    .difficulty-btn.active {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(200, 148, 62, 0.08);
    }

    /* ── Game Board ───────────────────────────────────── */
    .board-container {
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 400ms;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      width: clamp(260px, 50vw, 360px);
      aspect-ratio: 1;
      background: var(--accent-ember);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--accent-ember);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      background: var(--bg-surface);
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 300;
      cursor: pointer;
      transition: background 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }

    .cell:hover:not(.taken) {
      background: var(--bg-elevated);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.player {
      color: var(--accent-gold);
    }

    .cell.ai {
      color: var(--text-faint);
    }

    .cell.win-cell {
      background: rgba(200, 148, 62, 0.12);
    }

    .cell.win-cell.player {
      color: var(--accent-glow);
    }

    .cell.win-cell.ai {
      color: var(--text-muted);
    }

    /* ── Status Bar ───────────────────────────────────── */
    .status-bar {
      margin-top: clamp(1rem, 2vw, 1.5rem);
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 550ms;
      flex-wrap: wrap;
      justify-content: center;
    }

    .status-text {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 24, 'WONK' 1, 'SOFT' 40;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      color: var(--text-muted);
      min-height: 1.5em;
    }

    .status-text .highlight {
      color: var(--accent-gold);
    }

    .new-game-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.45rem 1.2rem;
      background: transparent;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .new-game-btn:hover {
      background: rgba(200, 148, 62, 0.12);
      color: var(--accent-glow);
    }

    /* ── Back Link ────────────────────────────────────── */
    .back-link {
      display: inline-block;
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      font-size: 0.88rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.25s ease;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 650ms;
    }

    .back-link:hover {
      color: var(--accent-gold);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 480px) {
      .page-content {
        padding-top: clamp(1.5rem, 4vh, 3rem);
      }
    }
  </style>
</head>
<body>
  <!-- SVG noise filter (hidden) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </svg>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="nav-link" style="--i:0" href="/">Home</a>
      <a class="nav-link active" style="--i:1" href="/games/">Games</a>
      <span class="nav-link coming-soon" style="--i:2">Music<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:3">Blog<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:4">Links<span class="coming-soon-tag">soon</span></span>
    </nav>
  </header>

  <main class="page-content">
    <h1 class="page-title">Tic Tac Toe</h1>

    <div class="difficulty-selector" role="group" aria-label="Difficulty">
      <button class="difficulty-btn" data-difficulty="easy">Easy</button>
      <button class="difficulty-btn active" data-difficulty="medium">Medium</button>
      <button class="difficulty-btn" data-difficulty="hard">Hard</button>
      <button class="difficulty-btn" data-difficulty="extreme">Extreme</button>
    </div>

    <div class="board-container">
      <div class="board" role="grid" aria-label="Tic Tac Toe board">
        <div class="cell" role="gridcell" data-index="0" tabindex="0" aria-label="Row 1, Column 1"></div>
        <div class="cell" role="gridcell" data-index="1" tabindex="0" aria-label="Row 1, Column 2"></div>
        <div class="cell" role="gridcell" data-index="2" tabindex="0" aria-label="Row 1, Column 3"></div>
        <div class="cell" role="gridcell" data-index="3" tabindex="0" aria-label="Row 2, Column 1"></div>
        <div class="cell" role="gridcell" data-index="4" tabindex="0" aria-label="Row 2, Column 2"></div>
        <div class="cell" role="gridcell" data-index="5" tabindex="0" aria-label="Row 2, Column 3"></div>
        <div class="cell" role="gridcell" data-index="6" tabindex="0" aria-label="Row 3, Column 1"></div>
        <div class="cell" role="gridcell" data-index="7" tabindex="0" aria-label="Row 3, Column 2"></div>
        <div class="cell" role="gridcell" data-index="8" tabindex="0" aria-label="Row 3, Column 3"></div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-text">Your turn — place your <span class="highlight">X</span></span>
      <button class="new-game-btn">New Game</button>
    </div>

    <a class="back-link" href="/games/">&larr; Back to Games</a>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Chase's House</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
