<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess - Chase's House</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Page Content ─────────────────────────────────── */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(2rem, 6vh, 5rem) clamp(1rem, 3vw, 4rem) clamp(2rem, 5vh, 4rem);
    }

    .page-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 48, 'WONK' 1, 'SOFT' 50;
      font-size: clamp(2rem, 5vw + 0.5rem, 3.5rem);
      font-weight: 350;
      color: var(--text-heading);
      line-height: 1.1;
      letter-spacing: -0.01em;
      text-align: center;
      animation: fadeSlideUp 800ms ease-out backwards;
      animation-delay: 100ms;
    }

    /* ── Difficulty Selector ──────────────────────────── */
    .difficulty-selector {
      display: flex;
      gap: 0.5rem;
      margin-top: clamp(1rem, 2vw, 1.5rem);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 250ms;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 1rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--accent-ember);
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .difficulty-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent-gold);
    }

    .difficulty-btn.active {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(200, 148, 62, 0.08);
    }

    /* ── Game Layout ─────────────────────────────────── */
    .game-layout {
      display: flex;
      gap: clamp(1rem, 2vw, 2rem);
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 400ms;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── Chess Board ─────────────────────────────────── */
    .board-container {
      position: relative;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: clamp(280px, 50vw, 480px);
      aspect-ratio: 1;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid var(--accent-ember);
      background: var(--bg-surface);
    }

    .square {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .square.light {
      background: var(--bg-elevated);
    }

    .square.dark {
      background: var(--bg-surface);
    }

    /* ── Square States ───────────────────────────────── */
    .square.selected {
      background: rgba(200, 148, 62, 0.25) !important;
    }

    .square.valid-move::after {
      content: '';
      position: absolute;
      width: 28%;
      height: 28%;
      border-radius: 50%;
      background: rgba(200, 148, 62, 0.35);
      pointer-events: none;
    }

    .square.valid-capture {
      background: rgba(176, 90, 58, 0.25) !important;
    }

    .square.valid-capture::after {
      content: '';
      position: absolute;
      inset: 4%;
      border-radius: 50%;
      border: 3px solid rgba(176, 90, 58, 0.5);
      pointer-events: none;
    }

    .square.last-move {
      background: rgba(200, 148, 62, 0.12) !important;
    }

    .square.check {
      background: rgba(176, 90, 58, 0.35) !important;
      box-shadow: inset 0 0 12px rgba(176, 90, 58, 0.4);
    }

    /* ── Pieces ───────────────────────────────────────── */
    .piece {
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      line-height: 1;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.15s ease;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.5));
      z-index: 1;
    }

    .piece.player-piece {
      cursor: pointer;
    }

    .piece.player-piece:hover {
      transform: scale(1.08);
    }

    /* ── Rank/File Labels ────────────────────────────── */
    .board-labels-rank {
      position: absolute;
      left: -1.2rem;
      top: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .board-labels-rank span {
      flex: 1;
      display: flex;
      align-items: center;
      font-size: 0.65rem;
      color: var(--text-faint);
    }

    .board-labels-file {
      position: absolute;
      bottom: -1.2rem;
      left: 0;
      width: 100%;
      display: flex;
    }

    .board-labels-file span {
      flex: 1;
      display: flex;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--text-faint);
    }

    /* ── Move History Panel ──────────────────────────── */
    .move-history {
      width: clamp(160px, 18vw, 220px);
      max-height: clamp(280px, 50vw, 480px);
      background: var(--bg-surface);
      border: 1px solid var(--accent-ember);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .move-history-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 20, 'WONK' 1, 'SOFT' 40;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(160, 104, 40, 0.15);
    }

    .move-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem 0;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .move-list::-webkit-scrollbar {
      width: 4px;
    }

    .move-list::-webkit-scrollbar-thumb {
      background: var(--accent-ember);
      border-radius: 2px;
    }

    .move-row {
      display: flex;
      padding: 0.15rem 0.8rem;
    }

    .move-row:hover {
      background: rgba(200, 148, 62, 0.05);
    }

    .move-number {
      width: 2rem;
      color: var(--text-faint);
      flex-shrink: 0;
    }

    .move-white, .move-black {
      flex: 1;
      padding: 0 0.2rem;
    }

    .move-white.latest, .move-black.latest {
      color: var(--accent-gold);
    }

    /* ── Promotion Modal ─────────────────────────────── */
    .promotion-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 11, 0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .promotion-overlay.active {
      display: flex;
    }

    .promotion-dialog {
      background: var(--bg-elevated);
      border: 2px solid var(--accent-gold);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
    }

    .promotion-title {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 24, 'WONK' 1, 'SOFT' 40;
      font-size: 1.1rem;
      color: var(--text-heading);
      margin-bottom: 1rem;
    }

    .promotion-pieces {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .promotion-piece {
      font-size: 2.5rem;
      padding: 0.5rem;
      background: var(--bg-surface);
      border: 1px solid var(--accent-ember);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
      line-height: 1;
    }

    .promotion-piece:hover {
      border-color: var(--accent-gold);
      background: rgba(200, 148, 62, 0.1);
      transform: scale(1.1);
    }

    /* ── Status Bar ───────────────────────────────────── */
    .status-bar {
      margin-top: clamp(1rem, 2vw, 1.5rem);
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 550ms;
      flex-wrap: wrap;
      justify-content: center;
    }

    .status-text {
      font-family: var(--font-display);
      font-variation-settings: 'opsz' 24, 'WONK' 1, 'SOFT' 40;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      color: var(--text-muted);
      min-height: 1.5em;
    }

    .status-text .highlight {
      color: var(--accent-gold);
    }

    .new-game-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.45rem 1.2rem;
      background: transparent;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .new-game-btn:hover {
      background: rgba(200, 148, 62, 0.12);
      color: var(--accent-glow);
    }

    /* ── Back Link ────────────────────────────────────── */
    .back-link {
      display: inline-block;
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      font-size: 0.88rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.25s ease;
      animation: fadeSlideUp 700ms ease-out backwards;
      animation-delay: 650ms;
    }

    .back-link:hover {
      color: var(--accent-gold);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .move-history {
        width: 100%;
        max-height: 150px;
        order: 1;
      }

      .game-layout {
        flex-direction: column;
        align-items: center;
      }

      .board {
        width: clamp(280px, 85vw, 480px);
      }

      .board-labels-rank { display: none; }
      .board-labels-file { display: none; }
    }

    @media (max-width: 480px) {
      .page-content {
        padding-top: clamp(1.5rem, 4vh, 3rem);
      }

      .board {
        width: clamp(280px, 92vw, 400px);
      }
    }
  </style>
</head>
<body>
  <!-- SVG noise filter (hidden) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </svg>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="nav-link" style="--i:0" href="/">Home</a>
      <a class="nav-link active" style="--i:1" href="/games/">Games</a>
      <span class="nav-link coming-soon" style="--i:2">Music<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:3">Blog<span class="coming-soon-tag">soon</span></span>
      <span class="nav-link coming-soon" style="--i:4">Links<span class="coming-soon-tag">soon</span></span>
    </nav>
  </header>

  <main class="page-content">
    <h1 class="page-title">Chess</h1>

    <div class="difficulty-selector" role="group" aria-label="Difficulty">
      <button class="difficulty-btn" data-difficulty="easy">Easy</button>
      <button class="difficulty-btn active" data-difficulty="medium">Medium</button>
      <button class="difficulty-btn" data-difficulty="hard">Hard</button>
      <button class="difficulty-btn" data-difficulty="extreme">Extreme</button>
    </div>

    <div class="game-layout">
      <div class="board-container">
        <div class="board-labels-rank" aria-hidden="true">
          <span>8</span><span>7</span><span>6</span><span>5</span>
          <span>4</span><span>3</span><span>2</span><span>1</span>
        </div>
        <div class="board" role="grid" aria-label="Chess board" id="board"></div>
        <div class="board-labels-file" aria-hidden="true">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
      </div>

      <div class="move-history">
        <div class="move-history-title">Moves</div>
        <div class="move-list" id="moveList"></div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-text">Your turn — <span class="highlight">select a piece</span></span>
      <button class="new-game-btn">New Game</button>
    </div>

    <a class="back-link" href="/games/">&larr; Back to Games</a>
  </main>

  <!-- Promotion Modal -->
  <div class="promotion-overlay" id="promotionOverlay">
    <div class="promotion-dialog">
      <div class="promotion-title">Promote pawn to:</div>
      <div class="promotion-pieces" id="promotionPieces"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 Chase's House</p>
  </footer>

  <script src="game.js"></script>
  <script src="ai.js"></script>
</body>
</html>
